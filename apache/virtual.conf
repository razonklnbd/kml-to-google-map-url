<VirtualHost *:443>

    ServerName shahadathossain.com

RewriteCond %{REQUEST_URI} ^/kml2glink$
RewriteRule ^ /kml2glink/ [R=301,L]

<Location /kml2glink>
    RequestHeader set X-Script-Name "/kml2glink"
    RequestHeader set X-Forwarded-Prefix "/kml2glink"
</Location>

ProxyPreserveHost On
ProxyPass /kml2glink/ http://127.0.0.1:54565/
ProxyPassReverse /kml2glink/ http://127.0.0.1:54565/



</VirtualHost>
