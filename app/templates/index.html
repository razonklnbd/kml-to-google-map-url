<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>KML / KMZ Route Converter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            border: none;
        }

        .result-box {
            position: relative;
            background: #111827;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
        }
        .result-box h6, .result-box a{
            color: white;
        }

        .result-box .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;

            padding: 6px 12px;
            border: 1px solid #444;
            border-radius: 6px;

            background: rgba(30, 30, 30, 0.9);
            color: white;
            cursor: pointer;

            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .result-box:hover .copy-btn {
            opacity: 1;
        }

        .result-box .copy-btn.copied {
            background: #1a7f37;
            border-color: #1a7f37;
        }

        table {
            color: white;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">KML / KMZ Route Converter</h2>

    <!-- Upload Section -->
    <div class="card p-3 mb-4">

        <form id="uploadForm" enctype="multipart/form-data">

            <input class="form-control mb-2" type="file" name="file" accept=".kml,.kmz" required>

            <button class="btn btn-primary w-100" type="submit">
                Upload & Generate
            </button>

        </form>

    </div>

    <!-- Result Section -->
    <div id="resultSection" style="display:none;">

        <div class="card p-3 mb-3">

            <h5>Google Maps URL</h5>

            <div class="result-box" id="mapUrlByName">
                <h6>By Name</h6>
                <button class="copy-btn" onclick="copyURL(this)">Copy URL</button>
                <a href="#" target="_blank"></a>
            </div>
            <div class="result-box" id="mapUrlByPoint">
                <h6>By Co-ordinate</h6>
                <button class="copy-btn" onclick="copyURL(this)">Copy URL</button>
                <a href="#" target="_blank"></a>
            </div>

        </div>

        <div class="card p-3">

            <h5>Route Points</h5>

            <table class="table table-dark table-striped mt-2">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                </tr>
                </thead>

                <tbody id="pointsTable"></tbody>
            </table>

            <button class="btn btn-sm btn-warning" onclick="copyCSV()">
                Copy CSV
            </button>

        </div>

    </div>

</div>

<script>
let latestPoints = [];

document.getElementById("uploadForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    uploadFile(new FormData(this));

});

function showResults(data){
    latestPoints = data.points;
    const write2link = function(id2write, what2write) {
        const child = document.getElementById(id2write).querySelectorAll("a")[0];
        child.href = what2write;
        child.textContent = what2write;
    };
    write2link("mapUrlByName", data.url.name);
    write2link("mapUrlByPoint", data.url.point);

    let table = document.getElementById("pointsTable");
    table.innerHTML = "";

    data.points.forEach(p => {
        table.innerHTML += `
            <tr>
                <td>${p.name}</td>
                <td>${p.latitude}</td>
                <td>${p.longitude}</td>
            </tr>
        `;
    });

    document.getElementById("resultSection").style.display = "block";
}

async function uploadFile(formData) {
    let res = await fetch("{{ url_for('upload') }}", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    // x01: CHALLENGE FLOW
    if (data.challenge_required) {

        let answer = prompt("Security Check: " + data.question);

        let verify = await fetch("{{ url_for('verify') }}", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "answer=" + answer
        });

        if (verify.ok) {
            alert("Verified!");
            showResults(data);
        } else {
            alert("Wrong answer");
        }

        return;
    } else {
        // NORMAL FLOW
        showResults(data);
    }

    
}

function copyURL(button) {
    try {
        const card = button.closest('.result-box');

        navigator.clipboard.writeText(
            card.querySelector("a").innerText
        );

        if (!button.dataset.originalText) {
            button.dataset.originalText = button.textContent;
        }

        clearTimeout(button.copyTimeout);

        button.textContent = 'Copied';
        button.classList.add('copied');

        button.copyTimeout = setTimeout(() => {
            button.textContent = button.dataset.originalText;
            button.classList.remove('copied');
        }, 2000);

    } catch (err) {
        console.error('Copy failed:', err);
    }
}

function copyCSV() {
    let csv = "Name,Latitude,Longitude\n";

    latestPoints.forEach(p => {
        csv += `${p.name},${p.latitude},${p.longitude}\n`;
    });

    navigator.clipboard.writeText(csv);
}
</script>

</body>
</html>
