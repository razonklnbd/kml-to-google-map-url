<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>KML / KMZ Route Converter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            border: none;
        }

        .result-box {
            background: #111827;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
        }

        table {
            color: white;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">KML / KMZ Route Converter</h2>

    <!-- Upload Section -->
    <div class="card p-3 mb-4">

        <form id="uploadForm" enctype="multipart/form-data">

            <input class="form-control mb-2" type="file" name="file" accept=".kml,.kmz" required>

            <button class="btn btn-primary w-100" type="submit">
                Upload & Generate
            </button>

        </form>

    </div>

    <!-- Result Section -->
    <div id="resultSection" style="display:none;">

        <div class="card p-3 mb-3">

            <h5>Google Maps URL</h5>

            <div class="result-box" id="mapUrl"></div>

            <button class="btn btn-sm btn-success mt-2" onclick="copyURL()">
                Copy URL
            </button>

        </div>

        <div class="card p-3">

            <h5>Route Points</h5>

            <table class="table table-dark table-striped mt-2">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                </tr>
                </thead>

                <tbody id="pointsTable"></tbody>
            </table>

            <button class="btn btn-sm btn-warning" onclick="copyCSV()">
                Copy CSV
            </button>

        </div>

    </div>

</div>

<script>
let latestPoints = [];

document.getElementById("uploadForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    uploadFile(new FormData(this));

});

function showResults(data){
    latestPoints = data.points;

    document.getElementById("mapUrl").innerText = data.url;

    let table = document.getElementById("pointsTable");
    table.innerHTML = "";

    data.points.forEach(p => {
        table.innerHTML += `
            <tr>
                <td>${p.name}</td>
                <td>${p.latitude}</td>
                <td>${p.longitude}</td>
            </tr>
        `;
    });

    document.getElementById("resultSection").style.display = "block";
}

async function uploadFile(formData) {
    let res = await fetch("{{ url_for('upload') }}", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    // CHALLENGE FLOW
    if (data.challenge_required) {

        let answer = prompt("Security Check: " + data.question);

        let verify = await fetch("{{ url_for('verify') }}", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "answer=" + answer
        });

        if (verify.ok) {
            alert("Verified!");
            showResults(data);
        } else {
            alert("Wrong answer");
        }

        return;
    } else {
        // NORMAL FLOW
        showResults(data);
    }

    
}

function copyURL() {
    navigator.clipboard.writeText(
        document.getElementById("mapUrl").innerText
    );
}

function copyCSV() {
    let csv = "Name,Latitude,Longitude\n";

    latestPoints.forEach(p => {
        csv += `${p.name},${p.latitude},${p.longitude}\n`;
    });

    navigator.clipboard.writeText(csv);
}
</script>

</body>
</html>
